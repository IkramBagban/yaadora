services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yaadora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yaadora
      POSTGRES_PASSWORD: yaadora
      POSTGRES_DB: yaadora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaadora -d yaadora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: yaadora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
