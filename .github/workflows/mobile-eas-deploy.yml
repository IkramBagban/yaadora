name: Mobile EAS APK Deploy

on:
  push:
    branches: [staging]
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/mobile-eas-deploy.yml"
  workflow_dispatch:

jobs:
  deploy-mobile-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.20

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint mobile
        run: bun run --cwd apps/mobile lint

      - name: Typecheck mobile
        run: bun run --cwd apps/mobile check-types

      - name: Build installable Android APK (preview)
        run: |
          cd apps/mobile
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" > .env
          echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> .env
          eas build --platform android --profile preview --non-interactive
